version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: interviewforge_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-interviewforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-interviewforge_secret}
      POSTGRES_DB: ${POSTGRES_DB:-interviewforge_db}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-interviewforge}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - interviewforge_network

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: interviewforge_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret} --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '--no-auth-warning', '-a', '${REDIS_PASSWORD:-redis_secret}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - interviewforge_network

  # API Server (Node.js/Express)
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: ${NODE_ENV:-development}
    container_name: interviewforge_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://${POSTGRES_USER:-interviewforge}:${POSTGRES_PASSWORD:-interviewforge_secret}@postgres:5432/${POSTGRES_DB:-interviewforge_db}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
    ports:
      - '4000:4000'
    volumes:
      - ./apps/api:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: npm run dev
    networks:
      - interviewforge_network

  # Web Frontend (Next.js)
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: ${NODE_ENV:-development}
    container_name: interviewforge_web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
      NEXT_PUBLIC_SOCKET_URL: http://localhost:4000
    ports:
      - '3000:3000'
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - api
    command: npm run dev
    networks:
      - interviewforge_network

  # Nginx Reverse Proxy (production only)
  nginx:
    image: nginx:alpine
    container_name: interviewforge_nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - web
    profiles:
      - production
    networks:
      - interviewforge_network

  # Redis Commander (Dev UI for Redis)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: interviewforge_redis_ui
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379:0:${REDIS_PASSWORD:-redis_secret}
    ports:
      - '8081:8081'
    depends_on:
      - redis
    profiles:
      - dev-tools
    networks:
      - interviewforge_network

  # pgAdmin (Dev UI for PostgreSQL)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: interviewforge_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@interviewforge.ai
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin_secret}
    ports:
      - '5050:80'
    depends_on:
      - postgres
    profiles:
      - dev-tools
    networks:
      - interviewforge_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  interviewforge_network:
    driver: bridge
